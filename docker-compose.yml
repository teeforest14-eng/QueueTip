# Local Postgres for QueueTip. Requires Docker Desktop (or Docker Engine).
# Usage:
#   docker compose up -d
#   Set DATABASE_URL in .env to:
#   postgresql://postgres:postgres@localhost:5433/queuetip?schema=public
#   npm run db:push && npm run db:seed

services:
  db:
    image: postgres:16-alpine
    container_name: queuetip-pg
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: queuetip
