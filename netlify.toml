# Next.js app lives at the repository root (same directory as package.json and next.config).
# In Netlify: leave "Base directory" empty, or set it to "." — NOT "src".
# A nested src/src folder or base = "src" can produce duplicate src paths and break the build.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
